<!DOCTYPE html>
<html>
<head>
    <title>Reflected XSS Tester</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; }
        input[type=text] { width: 70%; padding: 10px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .payloads { background: #f8f9fa; padding: 15px; margin: 20px 0; border-radius: 5px; }
        .result { border: 1px solid #ddd; padding: 20px; min-height: 100px; background: #f9f9f9; }
        .safe { background: #d4edda; border: 1px solid #c3e6cb; }
        .warning { background: #fff3cd; border: 1px solid #ffeaa7; }
        h3 { color: #007bff; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Reflected XSS 테스트 페이지</h1>
    <p><strong>파라미터 <code>?q=</code> 또는 <code>?search=</code>가 있을 때만 반사</strong></p>
    
    <div id="result" class="result safe">
        <strong>파라미터 없음</strong><br>
        ?q= 또는 ?search= 를 추가
    </div>
    
    <h3>사용 예시 (복사해서 Burp 사용)</h3>
    <pre>https://ryu-geonwoo.github.io/?search=&lt;img src=x onerror=alert(document.domain)&gt;</pre>

    <script>
        // 안전한 HTML escape
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 파라미터 확인 및 안전 반사
        function reflectParameter() {
            const urlParams = new URLSearchParams(window.location.search);
            const q = urlParams.get('q') || urlParams.get('search') || '';
            
            const result = document.getElementById('result');
            
            if (!q) {
                result.className = 'result safe';
                result.innerHTML = `
                    <strong style="color:green;">✅ 파라미터 없음 (안전)</strong><br>
                    <small>?q= 또는 ?search= 를 추가하세요!</small>
                `;
                return;
            }

            // 파라미터 있음 → 안전하게 표시
            result.className = 'result warning';
            result.innerHTML = `
                <strong style="color:orange;">⚠️ 파라미터 발견됨</strong><br>
                <strong>원본:</strong> ${escapeHtml(q)}<br><br>
                <strong>실행 영역 (innerHTML):</strong><br>
                <div id="vuln">${q}</div>  <!-- 여기가 실행! -->

            `;
        }
        
        // 초기 로드
        reflectParameter();
        
        // 테스트 함수
        function testPayload() {
            const payload = document.getElementById('payload').value;
            if (!payload) {
                alert('페이로드 입력하세요!');
                return;
            }
            const url = `${window.location.origin}${window.location.pathname}?q=${encodeURIComponent(payload)}`;
            window.open(url, '_blank');
        }
        
        function setPayload(p) {
            document.getElementById('payload').value = p;
        }
        
        function setPayloadAndTest(p) {
            setPayload(p);
            testPayload();
        }
    </script>
</body>
</html>
